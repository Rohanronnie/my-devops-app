name: Deploy to AWS S3 + CloudFront

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Run tests (won't fail if no tests written yet)
      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

      # Step 5: Build React app
      - name: Build React app
        run: npm run build

      # Step 6: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # Step 7: Sync build folder to S3
      - name: Deploy to S3
        run: |
          aws s3 sync ./build s3://my-devops-app-rohan-2026 \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "index.html"

          # index.html should NOT be cached — always fresh
          aws s3 cp ./build/index.html s3://my-devops-app-rohan-2026/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      # Step 8: Invalidate CloudFront cache
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # Step 9: Print live URL
      - name: Print deployed URL
        run: echo "✅ Deployed to https://d3t066cry690vh.cloudfront.net"
