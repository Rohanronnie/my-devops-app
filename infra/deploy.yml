name: Deploy to S3 + CloudFront

on:
  push:
    branches:
      - main                  # triggers only on push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'        # caches node_modules between runs

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci             # cleaner than npm install in CI

      # Step 4: Build React app
      - name: Build
        run: npm run build      # outputs to /build folder

      # Step 5: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # Step 6: Sync build folder to S3
      - name: Deploy to S3
        run: |
          aws s3 sync ./build s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "index.html"

          # index.html uploaded separately — no cache (always fresh)
          aws s3 cp ./build/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      # Step 7: Invalidate CloudFront cache
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
